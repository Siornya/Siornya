name: Update GitHub Stats

on:
  schedule:
    - cron: '0 0 * * 0'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Generate SVG
        run: node scripts/generate-stats.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_1 }}

      - name: Commit SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/github-stats.svg

          git commit -m "Update GitHub stats" || exit 0

          git push